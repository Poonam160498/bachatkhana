    itemPh: "ఉదా: సమోసా + కచోరి కాంబో (4 pc)",
    typeLabel: "రకం", qtyLabel: "సంఖ్య", emojiLabel: "ఇమోజీ",
    veg: "🟢 వెజ్", nonveg: "🔴 నాన్-వెజ్", mrpLabel: "MRP (₹)", priceLabel: "ఆదా ధర (₹)",
    offPreview: (p) => `కస్టమర్‌కు కనిపిస్తుంది: -${p}% OFF 🔥`,
    windowLabel: "పికప్ విండో", goLive: "లిస్టింగ్ లైవ్ చేయండి", myListings: "నా లిస్టింగ్స్", live: "లైవ్",
    toastFill: "ఐటమ్, MRP, ఆదా ధర — మూడూ నింపండి",
    toastPrice: "ఆదా ధర MRP కంటే తక్కువ ఉండాలి",
    toastLive: "లిస్టింగ్ లైవ్ అయ్యింది! 🎉",
    loginPhone: "మొబైల్ నంబర్ (10 అంకెలు)", loginPhoneErr: "10 అంకెల నంబర్ ఎంటర్ చేయండి", loginSend: "OTP పంపండి",
    loginOtpSent: (p) => `OTP పంపబడింది +91 ${p} కి`, loginOtpPh: "6-అంకెల OTP", loginName: "మీ పేరు",
    loginVerify: "వెరిఫై చేయండి", loginDemoOtp: (o) => `డెమో OTP: ${o} (నిజమైన యాప్‌లో SMS వస్తుంది)`,
    loginErr: "తప్పు OTP — మళ్లీ ప్రయత్నించండి", loginChange: "నంబర్ మార్చండి", logoutQ: "లాగౌట్ చేయాలా?",
    langTitle: "భాష ఎంచుకోండి · Choose language",
  },
};

const AREA_KEYS = ["ALL", "Vijay Nagar", "Bhawarkua", "Sarafa", "Chappan Dukan", "Palasia"];

const API = "";

const pct = (mrp, price) => Math.round(((mrp - price) / mrp) * 100);
const inr = (n) => "₹" + n.toLocaleString("en-IN");
const makeCode = () => "IND-" + Math.floor(1000 + Math.random() * 9000);

function App() {
  const [lang, setLang] = useState("hinglish");
  const [langOpen, setLangOpen] = useState(false);
  const [tab, setTab] = useState("shop");
  const [area, setArea] = useState("ALL");
  const [listings, setListings] = useState([]);
  const [orders, setOrders] = useState([]);
  const [booking, setBooking] = useState(null);
  const [verifyInput, setVerifyInput] = useState("");
  const [verifyMsg, setVerifyMsg] = useState(null);
  const [toast, setToast] = useState(null);
  const [f, setF] = useState({ item: "", emoji: "🍛", veg: true, qty: 5, mrp: "", price: "", window: "8:30 – 10:00 PM" });
  const [impact, setImpact] = useState({ meals: 0, rupees: 0, kg: 0 });
  const [user, setUser] = useState(null);
  const [authReady, setAuthReady] = useState(false);

  const t = STR[lang];

  useEffect(() => {
    if (!toast) return;
    const tm = setTimeout(() => setToast(null), 2600);
    return () => clearTimeout(tm);
  }, [toast]);

  const token = () => window.localStorage.getItem("bk_token") || "";
  const authHeaders = () => ({ "Content-Type": "application/json", "Authorization": "Bearer " + token() });
  const loadListings = () => fetch(API + "/api/listings").then((r) => r.json()).then(setListings).catch(() => setToast("Backend nahi mila — pehle 'python backend.py' chalao"));
  const loadOrders = () => fetch(API + "/api/orders", { headers: authHeaders() }).then((r) => (r.ok ? r.json() : [])).then(setOrders).catch(() => {});
  const loadImpact = () => fetch(API + "/api/impact").then((r) => r.json()).then(setImpact).catch(() => {});
  useEffect(() => {
    if (!token()) { setAuthReady(true); return; }
    fetch(API + "/api/me", { headers: authHeaders() })
      .then((r) => (r.ok ? r.json() : null))
      .then((u) => { if (u && u.phone) setUser(u); else window.localStorage.removeItem("bk_token"); })
      .catch(() => {})
      .finally(() => setAuthReady(true));
  }, []);
  useEffect(() => {
    if (!user) return;
    loadListings(); loadOrders(); loadImpact();
  }, [user]);
  const logout = () => {
    window.localStorage.removeItem("bk_token");
    setUser(null); setOrders([]);
  };

  const visible = listings.filter((l) => area === "ALL" || l.area === area);

  /* ---------- actions ---------- */
  const openBooking = (listing) => setBooking({ listing, qty: 1, stage: "select" });

  const payNow = () => {
    const { listing, qty } = booking;
    setBooking((b) => ({ ...b, stage: "paying" }));
    const finish = (order) => {
      if (order && order.code) {
        setBooking((b) => ({ ...b, stage: "done", order }));
        loadListings(); loadOrders();
      } else {
        setBooking(null);
        setToast(order && order.error ? order.error : "Kuch galat ho gaya");
      }
    };
    fetch(API + "/api/pay/create", {
      method: "POST", headers: authHeaders(),
      body: JSON.stringify({ listing_id: listing.id, qty }),
    })
      .then((r) => r.json())
      .then((res) => {
        if (res.mode === "razorpay") {
          const rzp = new window.Razorpay({
            key: res.key_id,
            amount: res.amount,
            currency: "INR",
            name: "BachatKhana",
            description: listing.item,
            order_id: res.rzp_order_id,
            prefill: { contact: user.phone },
            theme: { color: "#0E5E36" },
            handler: (resp) => {
              fetch(API + "/api/pay/confirm", {
                method: "POST", headers: authHeaders(),
                body: JSON.stringify({
                  listing_id: listing.id, qty,
                  razorpay_payment_id: resp.razorpay_payment_id,
                  razorpay_order_id: resp.razorpay_order_id,
                  razorpay_signature: resp.razorpay_signature,
                }),
              })
                .then((r) => r.json())
                .then(finish)
                .catch(() => { setBooking(null); setToast("Backend se connection nahi ho paya"); });
            },
            modal: { ondismiss: () => setBooking((b) => (b && b.stage === "paying" ? { ...b, stage: "select" } : b)) },
          });
          rzp.open();
        } else if (res.mode === "demo") {
          setTimeout(() => {
            fetch(API + "/api/orders", { method: "POST", headers: authHeaders(), body: JSON.stringify({ listing_id: listing.id, qty }) })
              .then((r) => r.json())
              .then(finish)
              .catch(() => { setBooking(null); setToast("Backend se connection nahi ho paya"); });
          }, 1200);
        } else {
          setBooking(null);
          setToast(res && res.error ? res.error : "Kuch galat ho gaya");
        }
      })
      .catch(() => { setBooking(null); setToast("Backend se connection nahi ho paya"); });
  };

  const verifyCode = () => {
    const code = verifyInput.trim().toUpperCase();
    if (!code) return;
    fetch(API + "/api/verify", {
      method: "POST",
      headers: authHeaders(),
      body: JSON.stringify({ code }),
    })
      .then((r) => r.json())
      .then((res) => {
        if (res.ok) {
          setVerifyMsg({ ok: true, text: t.verifyOk(code) });
          setVerifyInput("");
          loadOrders(); loadImpact();
        } else {
          setVerifyMsg({ ok: false, text: t.verifyFail });
        }
      })
      .catch(() => setVerifyMsg({ ok: false, text: "Backend se connection nahi ho paya" }));
  };

  const addListing = () => {
    if (!f.item.trim() || !f.mrp || !f.price) { setToast(t.toastFill); return; }
    if (Number(f.price) >= Number(f.mrp)) { setToast(t.toastPrice); return; }
    fetch(API + "/api/listings", {
      method: "POST",
      headers: authHeaders(),
      body: JSON.stringify({ item: f.item.trim(), emoji: f.emoji, veg: f.veg, qty: Number(f.qty) || 1, mrp: Number(f.mrp), price: Number(f.price), window: f.window }),
    })
      .then((r) => r.json())
      .then((res) => {
        if (res && res.id) {
          setF({ item: "", emoji: "🍛", veg: true, qty: 5, mrp: "", price: "", window: "8:30 – 10:00 PM" });
          setToast(t.toastLive);
          loadListings();
        } else {
          setToast(res && res.error ? res.error : "Kuch galat ho gaya");
        }
      })
      .catch(() => setToast("Backend se connection nahi ho paya"));
  };

  const currentLang = LANGS.find((l) => l.key === lang);

  /* ---------- render ---------- */
  if (!authReady) {
    return (
      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#DCE5DA", fontFamily: "'Baloo 2', system-ui, sans-serif", color: T.green, fontWeight: 800, fontSize: 20 }}>
        BachatKhana…
      </div>
    );
  }
  if (!user) return <LoginView t={t} onLogin={setUser} />;
  return (
    <div style={{ minHeight: "100vh", background: "#DCE5DA", display: "flex", justifyContent: "center", fontFamily: "'Baloo 2','Baloo Bhai 2','Baloo Da 2','Baloo Thambi 2','Baloo Tammudu 2', system-ui, sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Baloo+Bhai+2:wght@400;600;700;800&family=Baloo+Da+2:wght@400;600;700;800&family=Baloo+Thambi+2:wght@400;600;700;800&family=Baloo+Tammudu+2:wght@400;600;700;800&display=swap');
        * { box-sizing: border-box; margin: 0; }
        button { font-family: inherit; cursor: pointer; border: none; }
        input, select { font-family: inherit; }
        input:focus, select:focus, button:focus-visible { outline: 3px solid ${T.haldi}; outline-offset: 1px; }
        @keyframes popIn { from { transform: translateY(14px) scale(.97); opacity: 0; } to { transform: none; opacity: 1; } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
        .card-btn:active { transform: scale(.98); }
      `}</style>

      <div style={{ width: "100%", maxWidth: 430, background: T.paper, minHeight: "100vh", display: "flex", flexDirection: "column", position: "relative", boxShadow: "0 0 40px rgba(0,0,0,.18)" }}>

        {/* ===== Header ===== */}
        <header style={{ background: T.greenDeep, padding: "14px 16px 14px", color: "#fff" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
            <div style={{ fontWeight: 800, fontSize: 22, letterSpacing: "-0.5px", whiteSpace: "nowrap" }}>
              Bachat<span style={{ color: T.haldi }}>Khana</span>
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              <button onClick={() => { if (window.confirm(t.logoutQ)) logout(); }} aria-label="Logout" style={{ background: "rgba(255,255,255,.14)", color: "#fff", borderRadius: 999, padding: "5px 11px", fontSize: 12.5, fontWeight: 700 }}>
                👤 {(user.name || user.phone.slice(-4))}
              </button>
              <button onClick={() => setLangOpen(true)} aria-label="Change language" style={{ background: "rgba(255,255,255,.14)", color: "#fff", borderRadius: 999, padding: "5px 11px", fontSize: 12.5, fontWeight: 700 }}>
                🌐 {currentLang.native}
              </button>
              <div style={{ background: "rgba(255,255,255,.12)", borderRadius: 999, padding: "5px 11px", fontSize: 12.5, fontWeight: 600 }}>
                📍 Indore
              </div>
            </div>
          </div>
          <div style={{ fontSize: 12.5, opacity: 0.85, marginTop: 3 }}>{t.tagline}</div>

          {/* impact ticker */}
          <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
            {[
              { n: impact.meals.toLocaleString("en-IN"), l: t.statMeals },
              { n: inr(impact.rupees), l: t.statSavings },
              { n: impact.kg.toLocaleString("en-IN") + " kg", l: t.statFood },
            ].map((s, i) => (
              <div key={i} style={{ flex: 1, background: "rgba(255,255,255,.09)", borderRadius: 12, padding: "8px 6px", textAlign: "center" }}>
                <div style={{ fontWeight: 800, fontSize: 15, color: T.haldi }}>{s.n}</div>
                <div style={{ fontSize: 10.5, opacity: 0.85 }}>{s.l}</div>
              </div>
            ))}
          </div>
        </header>

        {/* ===== Body ===== */}
        <main style={{ flex: 1, overflowY: "auto", paddingBottom: 90 }}>
          {tab === "shop" && <ShopView t={t} area={area} setArea={setArea} visible={visible} openBooking={openBooking} />}
          {tab === "parchi" && <ParchiView t={t} orders={orders} goShop={() => setTab("shop")} />}
          {tab === "dukaan" && (
            <DukaanView
              t={t} f={f} setF={setF} addListing={addListing}
              listings={listings.filter((l) => l.mine)}
              orders={orders}
              verifyInput={verifyInput} setVerifyInput={setVerifyInput}
              verifyCode={verifyCode} verifyMsg={verifyMsg}
            />
          )}
        </main>

        {/* ===== Bottom nav ===== */}
        <nav style={{ position: "absolute", bottom: 0, left: 0, right: 0, background: "#fff", borderTop: `1px solid ${T.line}`, display: "flex", padding: "8px 6px 12px" }}>
          {[
            { k: "shop", icon: "🛍️", label: t.tabShop },
            { k: "parchi", icon: "🎟️", label: t.tabParchi, badge: orders.filter((o) => o.status === "READY").length },
            { k: "dukaan", icon: "🏪", label: t.tabDukaan },
          ].map((tb) => (
            <button key={tb.k} onClick={() => setTab(tb.k)} style={{ flex: 1, background: "none", padding: "6px 0", position: "relative", color: tab === tb.k ? T.green : "#8A968C", fontWeight: tab === tb.k ? 800 : 600, fontSize: 12 }}>
              <div style={{ fontSize: 21, filter: tab === tb.k ? "none" : "grayscale(.6)" }}>{tb.icon}</div>
              {tb.label}
              {tb.badge > 0 && (
                <span style={{ position: "absolute", top: 0, right: "24%", background: T.mirch, color: "#fff", borderRadius: 999, fontSize: 10, fontWeight: 800, padding: "1px 6px" }}>{tb.badge}</span>
              )}
              {tab === tb.k && <div style={{ height: 3, width: 26, background: T.haldi, borderRadius: 4, margin: "4px auto 0" }} />}
            </button>
          ))}
        </nav>

        {/* ===== Language sheet ===== */}
        {langOpen && (
          <div style={{ position: "absolute", inset: 0, background: "rgba(10,25,15,.55)", display: "flex", alignItems: "flex-end", zIndex: 70 }} onClick={() => setLangOpen(false)}>
            <div onClick={(e) => e.stopPropagation()} style={{ background: "#fff", width: "100%", borderRadius: "22px 22px 0 0", padding: "20px 18px 26px", animation: "popIn .28s ease", maxHeight: "75%", overflowY: "auto" }}>
              <div style={{ fontWeight: 800, fontSize: 16, color: T.ink, marginBottom: 14 }}>🌐 {t.langTitle}</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                {LANGS.map((l) => {
                  const active = l.key === lang;
                  return (
                    <button key={l.key} onClick={() => { setLang(l.key); setLangOpen(false); }} style={{
                      background: active ? T.haldiSoft : T.paper,
                      border: `2px solid ${active ? T.haldi : T.line}`,
                      borderRadius: 14, padding: "12px 10px", textAlign: "left",
                    }}>
                      <div style={{ fontWeight: 800, fontSize: 16, color: T.ink }}>
                        {l.native} {active && <span style={{ color: T.green }}>✓</span>}
                      </div>
                      <div style={{ fontSize: 11.5, color: "#7B877D", fontWeight: 600 }}>{l.sub}</div>
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {/* ===== Booking modal ===== */}
        {booking && (
          <BookingSheet t={t} booking={booking} setBooking={setBooking} payNow={payNow} goParchi={() => { setBooking(null); setTab("parchi"); }} />
        )}

        {/* ===== Toast ===== */}
        {toast && (
          <div style={{ position: "absolute", bottom: 96, left: "50%", transform: "translateX(-50%)", background: T.ink, color: "#fff", padding: "10px 18px", borderRadius: 999, fontSize: 13.5, fontWeight: 600, whiteSpace: "nowrap", animation: "popIn .25s ease", zIndex: 60 }}>
            {toast}
          </div>
        )}
      </div>
    </div>
  );
}

/* ================= Shop (customer) ================= */
function ShopView({ t, area, setArea, visible, openBooking }) {
  return (
    <div>
      <div style={{ display: "flex", gap: 8, overflowX: "auto", padding: "14px 16px 6px", scrollbarWidth: "none" }}>
        {AREA_KEYS.map((a) => (
          <button key={a} onClick={() => setArea(a)} style={{
            flexShrink: 0, padding: "7px 14px", borderRadius: 999, fontSize: 13, fontWeight: 700,
            background: area === a ? T.green : "#fff",
            color: area === a ? "#fff" : T.body,
            border: `1.5px solid ${area === a ? T.green : T.line}`,
          }}>{a === "ALL" ? t.allAreas : a}</button>
        ))}
      </div>

      <div style={{ padding: "8px 16px 4px", fontSize: 13, color: T.body, fontWeight: 600 }}>
        {t.dealsLive(visible.filter((l) => l.qty > 0).length)}
      </div>

      <div style={{ padding: "6px 16px 16px", display: "flex", flexDirection: "column", gap: 12 }}>
        {visible.map((l) => {
          const out = l.qty <= 0;
          return (
            <div key={l.id} className="card-btn" style={{ background: T.card, borderRadius: 18, padding: 14, border: `1px solid ${T.line}`, opacity: out ? 0.55 : 1, animation: "popIn .3s ease", transition: "transform .1s" }}>
              <div style={{ display: "flex", gap: 12 }}>
                <div style={{ width: 62, height: 62, borderRadius: 14, background: T.haldiSoft, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 32, flexShrink: 0 }}>
                  {l.emoji}
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={{ width: 12, height: 12, borderRadius: 3, border: `2px solid ${l.veg ? "#1E8E3E" : "#B3261E"}`, display: "inline-flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                      <span style={{ width: 5, height: 5, borderRadius: "50%", background: l.veg ? "#1E8E3E" : "#B3261E" }} />
                    </span>
                    <div style={{ fontWeight: 800, fontSize: 15, color: T.ink, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{l.shop}</div>
                  </div>
                  <div style={{ fontSize: 13, color: T.body, lineHeight: 1.35, marginTop: 2 }}>{l.item}</div>
                  <div style={{ fontSize: 11.5, color: "#7B877D", marginTop: 3 }}>
                    ⭐ {l.rating} · {l.area} · {l.dist}
                  </div>
                </div>
                <div style={{ background: T.mirch, color: "#fff", borderRadius: 10, fontWeight: 800, fontSize: 13, padding: "4px 8px", height: "fit-content" }}>
                  -{pct(l.mrp, l.price)}%
                </div>
              </div>

              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 12, gap: 8 }}>
                <div style={{ minWidth: 0 }}>
                  <span style={{ fontWeight: 800, fontSize: 19, color: T.green }}>{inr(l.price)}</span>
                  <span style={{ fontSize: 13, color: "#96A198", textDecoration: "line-through", marginLeft: 7 }}>{inr(l.mrp)}</span>
                  <div style={{ fontSize: 11.5, color: T.body, marginTop: 1 }}>🕘 {t.pickupPrefix}: {l.window} · {out ? t.finished : t.left(l.qty)}</div>
                </div>
                <button disabled={out} onClick={() => openBooking(l)} style={{
                  background: out ? "#C4CDC5" : T.green, color: "#fff", fontWeight: 800, fontSize: 13.5,
                  padding: "10px 16px", borderRadius: 12, flexShrink: 0,
                }}>{out ? t.soldOut : t.book}</button>
              </div>
            </div>
          );
        })}
        {visible.length === 0 && (
          <div style={{ textAlign: "center", padding: 40, color: T.body }}>{t.emptyArea}</div>
        )}
      </div>
    </div>
  );
}

/* ================= Booking sheet ================= */
function BookingSheet({ t, booking, setBooking, payNow, goParchi }) {
  const { listing: l, qty, stage, order } = booking;
  const maxQty = Math.min(3, l.qty);
  const total = l.price * qty;
  const saved = (l.mrp - l.price) * qty;

  return (
    <div style={{ position: "absolute", inset: 0, background: "rgba(10,25,15,.55)", display: "flex", alignItems: "flex-end", zIndex: 50 }}
      onClick={() => stage !== "paying" && setBooking(null)}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: "#fff", width: "100%", borderRadius: "22px 22px 0 0", padding: "20px 20px 26px", animation: "popIn .28s ease" }}>

        {stage === "select" && (
          <>
            <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
              <div style={{ fontSize: 38 }}>{l.emoji}</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 800, fontSize: 16, color: T.ink }}>{l.shop}</div>
                <div style={{ fontSize: 13, color: T.body }}>{l.item}</div>
              </div>
            </div>

            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 18, background: T.paper, borderRadius: 14, padding: "12px 14px" }}>
              <div style={{ fontWeight: 700, fontSize: 14, color: T.ink }}>{t.howMany}</div>
              <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                <button onClick={() => setBooking((b) => ({ ...b, qty: Math.max(1, b.qty - 1) }))} style={qtyBtn}>−</button>
                <span style={{ fontWeight: 800, fontSize: 18, minWidth: 20, textAlign: "center" }}>{qty}</span>
                <button onClick={() => setBooking((b) => ({ ...b, qty: Math.min(maxQty, b.qty + 1) }))} style={qtyBtn}>+</button>
              </div>
            </div>

            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 16, fontSize: 14.5, gap: 8, flexWrap: "wrap" }}>

        {stage === "paying" && (
          <div style={{ textAlign: "center", padding: "30px 0 34px" }}>

        {stage === "done" && order && (
          <div style={{ textAlign: "center" }}>

            <div style={{ fontWeight: 800, fontSize: 18, color: T.ink }}>{t.confirmed}</div>
            <div style={{ fontSize: 13, color: T.body, marginTop: 2 }}>{t.showParchi}</div>

            <div style={{ margin: "16px auto 0", maxWidth: 300, background: T.haldiSoft, border: `2px dashed ${T.haldi}`, borderRadius: 16, padding: "16px 14px" }}>

              <div style={{ fontWeight: 800, fontSize: 32, color: T.green, letterSpacing: 2, margin: "4px 0" }}>{order.code}</div>

    </div>
  );
}

/* ================= Parchi (orders) ================= */

          {t.seeDeals}
        </button>
      </div>
    );
  }
  return (
    <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 14 }}>
      {orders.map((o) => {

          <div key={o.id} style={{ background: done ? "#EFF3EE" : T.haldiSoft, border: `2px dashed ${done ? "#B9C6BB" : T.haldi}`, borderRadius: 18, padding: 16, opacity: done ? 0.75 : 1, animation: "popIn .3s ease" }}>

                <div style={{ fontWeight: 800, fontSize: 28, color: done ? "#8A968C" : T.green, letterSpacing: 2 }}>{o.code}</div>

                {done ? t.collectedTag : t.ready}
              </span>
            </div>
            <div style={{ borderTop: `1.5px dashed ${done ? "#C6D0C8" : T.haldi}`, margin: "10px 0" }} />
            <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
              <div style={{ fontSize: 28 }}>{o.emoji}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 800, fontSize: 14.5, color: T.ink }}>{o.shop}</div>

                <div style={{ fontSize: 11.5, color: T.mirch, fontWeight: 700 }}>{t.savedAmt(inr(o.saved))}</div>

        {t.parchiHint}
      </div>
    </div>
  );
}

/* ================= Login (OTP) ================= */
function LoginView({ t, onLogin }) {
  const [stage, setStage] = useState("phone");
  const [phone, setPhone] = useState("");
  const [otp, setOtp] = useState("");
  const [name, setName] = useState("");
  const [isNew, setIsNew] = useState(false);
  const [demoOtp, setDemoOtp] = useState(null);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState(null);

  const digits = (s) => s.replace(/[^0-9]/g, "").slice(-10);
  const inpL = { width: "100%", border: `1.5px solid ${T.line}`, borderRadius: 14, padding: "14px 15px", fontSize: 16, background: "#fff", color: T.ink, fontWeight: 700 };
  const btnL = { width: "100%", marginTop: 12, background: T.green, color: "#fff", fontWeight: 800, fontSize: 15.5, padding: "15px", borderRadius: 14, opacity: busy ? 0.6 : 1 };

  const sendOtp = () => {
    const p = digits(phone);
    if (p.length !== 10) { setErr(t.loginPhoneErr); return; }
    setBusy(true); setErr(null);
    fetch("/api/auth/send-otp", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ phone: p }) })
      .then((r) => r.json())
      .then((res) => {
        if (res.ok) { setIsNew(!!res.is_new); setDemoOtp(res.demo_otp || null); setStage("otp"); }
        else setErr(res.error || t.loginErr);
      })
      .catch(() => setErr("Backend nahi mila — 'python backend.py' chal raha hai?"))
      .finally(() => setBusy(false));
  };

  const verify = () => {
    setBusy(true); setErr(null);
    fetch("/api/auth/verify-otp", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ phone: digits(phone), otp: otp.trim(), name: name.trim() }) })
      .then((r) => r.json())
      .then((res) => {
        if (res.token) { window.localStorage.setItem("bk_token", res.token); onLogin(res.user); }
        else setErr(res.error || t.loginErr);
      })
      .catch(() => setErr("Backend se connection nahi ho paya"))
      .finally(() => setBusy(false));
  };

  return (
    <div style={{ minHeight: "100vh", background: "#DCE5DA", display: "flex", justifyContent: "center", fontFamily: "'Baloo 2','Baloo Bhai 2','Baloo Da 2','Baloo Thambi 2','Baloo Tammudu 2', system-ui, sans-serif" }}>
      <div style={{ width: "100%", maxWidth: 430, background: T.paper, minHeight: "100vh", display: "flex", flexDirection: "column", boxShadow: "0 0 40px rgba(0,0,0,.18)" }}>
        <div style={{ background: T.greenDeep, padding: "48px 24px 36px", color: "#fff", textAlign: "center" }}>
          <div style={{ fontWeight: 800, fontSize: 34, letterSpacing: "-0.5px" }}>
            Bachat<span style={{ color: T.haldi }}>Khana</span>
          </div>
          <div style={{ fontSize: 13.5, opacity: 0.85, marginTop: 6 }}>{t.tagline}</div>
        </div>
        <div style={{ padding: 24 }}>
          <div style={{ background: "#fff", borderRadius: 20, padding: 20, border: `1px solid ${T.line}` }}>
            {stage === "phone" && (
              <>
                <div style={{ fontWeight: 800, fontSize: 17, color: T.ink, marginBottom: 12 }}>{t.loginPhone}</div>
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <span style={{ fontWeight: 800, color: T.body, fontSize: 16 }}>+91</span>
                  <input value={phone} onChange={(e) => setPhone(e.target.value)} placeholder="98765 43210" inputMode="numeric" style={{ ...inpL, flex: 1 }} />
                </div>
                <button disabled={busy} onClick={sendOtp} style={btnL}>{t.loginSend}</button>
              </>
            )}
            {stage === "otp" && (
              <>
                <div style={{ fontWeight: 800, fontSize: 16, color: T.ink }}>{t.loginOtpSent(digits(phone))}</div>
                {demoOtp && (
                  <div style={{ marginTop: 8, background: T.haldiSoft, border: `1.5px dashed ${T.haldi}`, borderRadius: 12, padding: "9px 12px", fontSize: 13.5, fontWeight: 800, color: T.ink }}>
                    {t.loginDemoOtp(demoOtp)}
                  </div>
                )}
                <input value={otp} onChange={(e) => setOtp(e.target.value)} placeholder={t.loginOtpPh} inputMode="numeric" style={{ ...inpL, marginTop: 12, letterSpacing: 6, textAlign: "center" }} />
                {isNew && (
                  <input value={name} onChange={(e) => setName(e.target.value)} placeholder={t.loginName} style={{ ...inpL, marginTop: 10 }} />
                )}
                <button disabled={busy} onClick={verify} style={btnL}>{t.loginVerify}</button>
                <button onClick={() => { setStage("phone"); setOtp(""); setErr(null); }} style={{ width: "100%", marginTop: 8, background: "none", color: T.body, fontWeight: 700, fontSize: 13, padding: 6 }}>
                  {t.loginChange}
                </button>
              </>
            )}
            {err && <div style={{ marginTop: 10, fontSize: 13, fontWeight: 700, color: T.mirch }}>{err}</div>}
          </div>
        </div>
      </div>
    </div>
  );
}
